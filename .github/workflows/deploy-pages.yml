name: Deploy dashboard to GitHub Pages

# Publishes the static dashboard to GitHub Pages on every push to main.
# One-time setup: repo Settings -> Pages -> "Build and deployment" -> Source = "GitHub Actions".

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; newer pushes cancel in-progress ones.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Regenerate hubs-data.js from the xlsx
        # The map reads hubs-data.js, not the .xlsx, so rebuild it here. This
        # makes dropping a new data/hub_prioritization_results.xlsx enough —
        # no need to run the generator by hand and commit the result.
        run: |
          python -m pip install --quiet openpyxl
          python scripts/generate_hubs_data.py \
            --xlsx data/hub_prioritization_results.xlsx \
            --out hubs-data.js

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # The whole repo is the static site (index.html at the root).
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
